# Kubernetes Deployment for Kafka Training Application
# This demonstrates production-ready Kubernetes deployment for data engineers
#
# Prerequisites:
#   - Kafka cluster running (use Strimzi operator or managed service)
#   - PostgreSQL database (use operator or cloud service)
#   - Schema Registry deployed
#
# Deploy:
#   kubectl apply -f k8s/
#
# Scale:
#   kubectl scale deployment kafka-training-app --replicas=5
#
# Update:
#   kubectl set image deployment/kafka-training-app app=kafka-training:v2.0.0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-training-app
  namespace: data-engineering
  labels:
    app: kafka-training
    tier: application
    component: training
spec:
  replicas: 3  # Start with 3 replicas for high availability
  selector:
    matchLabels:
      app: kafka-training
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Create 1 extra pod during update
      maxUnavailable: 0  # Keep all current pods until new ones ready
  template:
    metadata:
      labels:
        app: kafka-training
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      # Security context for running as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Init container to wait for Kafka
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.36
        command:
          - 'sh'
          - '-c'
          - |
            echo "Waiting for Kafka to be ready..."
            until nc -z kafka-cluster.data-platform.svc.cluster.local 9092; do
              echo "Kafka not ready yet, waiting..."
              sleep 5
            done
            echo "Kafka is ready!"

      containers:
      - name: app
        image: kafka-training:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: actuator
          containerPort: 8081
          protocol: TCP

        # Environment configuration
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"

        # Kafka configuration
        - name: TRAINING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-cluster.data-platform.svc.cluster.local:9092"

        - name: TRAINING_KAFKA_SCHEMA_REGISTRY_URL
          value: "http://schema-registry.data-platform.svc.cluster.local:8082"

        - name: TRAINING_KAFKA_CONNECT_URL
          value: "http://kafka-connect.data-platform.svc.cluster.local:8083"

        # Database configuration
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres.data-platform.svc.cluster.local:5432/eventmart"

        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username

        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password

        # Application configuration
        - name: TRAINING_FEATURES_DEBUG_MODE
          value: "false"

        - name: TRAINING_FEATURES_WEB_INTERFACE_ENABLED
          value: "true"

        - name: TRAINING_EVENTMART_DEMO_AUTO_START
          value: "false"

        # JVM configuration
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

        # Pod information
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        # Resource limits and requests
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        # Liveness probe - is the app running?
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1

        # Readiness probe - is the app ready for traffic?
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1

        # Startup probe - has the app started successfully?
        startupProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

        # Volume mounts for logs
        volumeMounts:
        - name: logs
          mountPath: /var/log/kafka-training

      # Volumes
      volumes:
      - name: logs
        emptyDir: {}

      # Pod placement preferences
      affinity:
        # Try to spread pods across different nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - kafka-training
              topologyKey: kubernetes.io/hostname

      # Restart policy
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
# Service for the application
apiVersion: v1
kind: Service
metadata:
  name: kafka-training-service
  namespace: data-engineering
  labels:
    app: kafka-training
spec:
  type: ClusterIP  # Use LoadBalancer or NodePort for external access
  selector:
    app: kafka-training
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: actuator
    port: 8081
    targetPort: actuator
    protocol: TCP
  sessionAffinity: None

---
# HorizontalPodAutoscaler - Auto-scale based on CPU usage
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kafka-training-hpa
  namespace: data-engineering
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kafka-training-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-training-config
  namespace: data-engineering
data:
  application.properties: |
    # Kafka Training Configuration
    training.kafka.client-id=kafka-training-k8s
    training.features.auto-topic-creation=true
    logging.level.com.training.kafka=INFO
    management.endpoints.web.exposure.include=health,metrics,prometheus
    management.endpoint.health.probes.enabled=true

---
# Secret for PostgreSQL credentials (example - use proper secret management)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: data-engineering
type: Opaque
stringData:
  username: eventmart
  password: changeme-in-production  # Use proper secret management!

---
# PodDisruptionBudget - Ensure availability during voluntary disruptions
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kafka-training-pdb
  namespace: data-engineering
spec:
  minAvailable: 2  # Always keep at least 2 pods running
  selector:
    matchLabels:
      app: kafka-training
