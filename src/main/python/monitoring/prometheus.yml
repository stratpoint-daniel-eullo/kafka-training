# ============================================================================
# Useful Prometheus Queries (for reference)
# ============================================================================
#
# Kafka Metrics:
# - kafka_server_replicamanager_total_underreplicatedpartitions
# - kafka_server_brokertopicmetrics_total_messagesinpersec
# - kafka_controller_kafkacontroller_total_activecontrollercount
#
# Producer Metrics:
# - ecommerce_messages_produced_total
# - ecommerce_producer_errors_total
# - rate(ecommerce_messages_produced_total[5m])
#
# Consumer Metrics:
# - ecommerce_messages_consumed_total
# - ecommerce_consumer_lag
# - ecommerce_processing_time_seconds
# - rate(ecommerce_messages_consumed_total[5m])
#
# Stream Processing:
# - ecommerce_stream_events_processed_total
# - ecommerce_stream_state_size_bytes
# - rate(ecommerce_stream_events_processed_total[5m])
#
# Error Metrics:
# - ecommerce_errors_total
# - ecommerce_dlq_messages_total
# - rate(ecommerce_errors_total[5m])
#
# System Metrics (if exporters enabled):
# - node_cpu_seconds_total
# - node_memory_MemAvailable_bytes
# - container_memory_usage_bytes
# - container_cpu_usage_seconds_total
#
