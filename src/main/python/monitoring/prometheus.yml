# ============================================================================
# E-Commerce Analytics Platform - Prometheus Configuration
# Day 8: Monitoring and Observability
# ============================================================================

global:
  # How frequently to scrape targets
  scrape_interval: 15s

  # How long until a scrape request times out
  scrape_timeout: 10s

  # How frequently to evaluate rules
  evaluation_interval: 15s

  # External labels to add to any time series or alerts
  external_labels:
    cluster: 'ecommerce-analytics'
    environment: 'development'

# ============================================================================
# Alertmanager Configuration
# ============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Uncomment when Alertmanager is set up
          # - targets: ['alertmanager:9093']

# ============================================================================
# Rule Files
# ============================================================================
rule_files:
  # - "alerts/*.yml"
  # - "rules/*.yml"

# ============================================================================
# Scrape Configurations
# ============================================================================

scrape_configs:

  # --------------------------------------------------------------------------
  # Prometheus Self-Monitoring
  # --------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          tier: 'monitoring'

  # --------------------------------------------------------------------------
  # Kafka Broker JMX Metrics (Day 8)
  # --------------------------------------------------------------------------
  - job_name: 'kafka-broker'
    static_configs:
      - targets: ['kafka:9093']
        labels:
          service: 'kafka'
          tier: 'streaming'
    # JMX exporter configuration
    metrics_path: '/metrics'
    scrape_interval: 30s

  # --------------------------------------------------------------------------
  # Schema Registry Metrics (Day 6)
  # --------------------------------------------------------------------------
  - job_name: 'schema-registry'
    static_configs:
      - targets: ['schema-registry:8081']
        labels:
          service: 'schema-registry'
          tier: 'streaming'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # --------------------------------------------------------------------------
  # Kafka Connect Metrics (Day 7)
  # --------------------------------------------------------------------------
  - job_name: 'kafka-connect'
    static_configs:
      - targets: ['kafka-connect:8083']
        labels:
          service: 'kafka-connect'
          tier: 'integration'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # --------------------------------------------------------------------------
  # PostgreSQL Exporter (Analytics Database)
  # --------------------------------------------------------------------------
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgresql'
          tier: 'database'
          database: 'ecommerce_analytics'
    scrape_interval: 30s

  # --------------------------------------------------------------------------
  # E-Commerce Application Metrics (Python)
  # --------------------------------------------------------------------------
  - job_name: 'ecommerce-app'
    static_configs:
      - targets: ['ecommerce-app:9091']
        labels:
          service: 'ecommerce-app'
          tier: 'application'
          language: 'python'

    # Scrape custom application metrics
    metrics_path: '/metrics'
    scrape_interval: 15s

  # --------------------------------------------------------------------------
  # Producer Metrics (Day 3)
  # --------------------------------------------------------------------------
  - job_name: 'producers'
    static_configs:
      - targets: ['ecommerce-app:9091']
        labels:
          service: 'producers'
          tier: 'application'
          component: 'producer'
    metrics_path: '/metrics'
    scrape_interval: 15s
    metric_relabel_configs:
      # Only keep producer-related metrics
      - source_labels: [__name__]
        regex: 'ecommerce_messages_produced.*|ecommerce_producer.*'
        action: keep

  # --------------------------------------------------------------------------
  # Consumer Metrics (Day 4)
  # --------------------------------------------------------------------------
  - job_name: 'consumers'
    static_configs:
      - targets: ['ecommerce-app:9091']
        labels:
          service: 'consumers'
          tier: 'application'
          component: 'consumer'
    metrics_path: '/metrics'
    scrape_interval: 15s
    metric_relabel_configs:
      # Only keep consumer-related metrics
      - source_labels: [__name__]
        regex: 'ecommerce_messages_consumed.*|ecommerce_consumer.*|ecommerce_processing.*'
        action: keep

  # --------------------------------------------------------------------------
  # Stream Processing Metrics (Day 6: Faust)
  # --------------------------------------------------------------------------
  - job_name: 'stream-processors'
    static_configs:
      - targets: ['ecommerce-app:9091']
        labels:
          service: 'stream-processors'
          tier: 'application'
          component: 'faust'
    metrics_path: '/metrics'
    scrape_interval: 15s
    metric_relabel_configs:
      # Only keep stream processing metrics
      - source_labels: [__name__]
        regex: 'ecommerce_stream.*|faust.*'
        action: keep

  # --------------------------------------------------------------------------
  # Error & DLQ Metrics (Day 8)
  # --------------------------------------------------------------------------
  - job_name: 'error-handling'
    static_configs:
      - targets: ['ecommerce-app:9091']
        labels:
          service: 'error-handling'
          tier: 'application'
          component: 'dlq'
    metrics_path: '/metrics'
    scrape_interval: 15s
    metric_relabel_configs:
      # Only keep error and DLQ metrics
      - source_labels: [__name__]
        regex: 'ecommerce_errors.*|ecommerce_dlq.*|ecommerce_failures.*'
        action: keep

  # --------------------------------------------------------------------------
  # Node Exporter (System Metrics) - Optional
  # --------------------------------------------------------------------------
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #       labels:
  #         service: 'node-exporter'
  #         tier: 'infrastructure'
  #   scrape_interval: 30s

  # --------------------------------------------------------------------------
  # cAdvisor (Container Metrics) - Optional
  # --------------------------------------------------------------------------
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #       labels:
  #         service: 'cadvisor'
  #         tier: 'infrastructure'
  #   scrape_interval: 30s
  #   metrics_path: '/metrics'

