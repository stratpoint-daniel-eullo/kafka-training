# Spring Boot Application Configuration
spring.application.name=kafka-training-java
server.port=8080

# Spring Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.client-id=kafka-training-client

# Spring Kafka Producer Configuration
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.properties.linger.ms=10
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.compression-type=snappy
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Spring Kafka Consumer Configuration
spring.kafka.consumer.group-id=training-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.max-poll-records=500
spring.kafka.consumer.properties.session.timeout.ms=30000
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Spring Kafka Streams Configuration
spring.kafka.streams.application-id=kafka-training-streams
spring.kafka.streams.replication-factor=1
spring.kafka.streams.properties.default.deserialization.exception.handler=org.apache.kafka.streams.errors.LogAndContinueExceptionHandler

# Kafka Streams Advanced Configuration (Day 5)
spring.kafka.streams.properties.num.stream.threads=2
spring.kafka.streams.properties.processing.guarantee=exactly_once_v2
spring.kafka.streams.properties.commit.interval.ms=10000
spring.kafka.streams.properties.state.dir=/tmp/kafka-streams
spring.kafka.streams.properties.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.default.value.serde=org.apache.kafka.common.serialization.Serdes$StringSerde

# Kafka Streams Window Configuration
spring.kafka.streams.properties.window.store.change.log.additional.retention.ms=86400000

# Kafka Streams Performance Tuning
spring.kafka.streams.properties.buffered.records.per.partition=1000
spring.kafka.streams.properties.max.task.idle.ms=0

# Training-specific Configuration
training.kafka.bootstrap-servers=localhost:9092
training.kafka.client-id=kafka-training-client

# Schema Registry Configuration (Day 6)
training.kafka.schema-registry-url=http://localhost:8082
spring.kafka.properties.schema.registry.url=http://localhost:8082

# Kafka Connect Configuration (Day 7)
training.kafka.connect-url=http://localhost:8083

# PostgreSQL Data Source Configuration (Day 7)
spring.datasource.url=jdbc:postgresql://localhost:5432/eventmart
spring.datasource.username=eventmart
spring.datasource.password=eventmart123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Avro Serializer Configuration (Day 6)
spring.kafka.producer.properties.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
spring.kafka.consumer.properties.value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.specific.avro.reader=true

# Schema Registry Client Configuration
spring.kafka.properties.auto.register.schemas=true
spring.kafka.properties.use.latest.version=false
spring.kafka.properties.schema.compatibility=BACKWARD

# Training Producer Configuration
training.producer.acks=all
training.producer.retries=3
training.producer.batch-size=16384
training.producer.linger-ms=10
training.producer.buffer-memory=33554432
training.producer.compression-type=snappy

# Training Consumer Configuration
training.consumer.group-id=training-consumer-group
training.consumer.auto-offset-reset=earliest
training.consumer.enable-auto-commit=false
training.consumer.max-poll-records=500
training.consumer.session-timeout-ms=30000

# Training Streams Configuration
training.streams.application-id=kafka-training-streams
training.streams.replication-factor=1
training.streams.default-deserialization-exception-handler=org.apache.kafka.streams.errors.LogAndContinueExceptionHandler
training.streams.num-stream-threads=2
training.streams.processing-guarantee=exactly_once_v2
training.streams.commit-interval-ms=10000
training.streams.state-dir=/tmp/kafka-streams

# Logging Configuration
logging.level.org.apache.kafka=INFO
logging.level.io.confluent=INFO
logging.level.com.training.kafka=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.web=INFO

# Management and Monitoring
management.endpoints.web.exposure.include=health,info,metrics,kafka
management.endpoint.health.show-details=when-authorized
