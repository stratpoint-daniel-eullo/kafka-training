# Spring Boot Development Profile Configuration
# This profile is optimized for local development with detailed logging and debugging features

spring:
  # Application Configuration
  application:
    name: kafka-training-dev

  # Kafka Configuration for Development
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: kafka-training-dev-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: true
      auto-commit-interval: 1000
      session-timeout: 30000
      heartbeat-interval: 3000
      max-poll-records: 500
      fetch-min-size: 1
      fetch-max-wait: 500
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      retries: 3
      batch-size: 16384
      linger-ms: 5
      buffer-memory: 33554432
      compression-type: snappy
      max-in-flight-requests-per-connection: 5
      enable-idempotence: false
    admin:
      fail-fast: false
      properties:
        request.timeout.ms: 30000
        connections.max.idle.ms: 300000

  # Web Configuration
  web:
    resources:
      cache:
        period: 0  # Disable caching for development

  # DevTools Configuration
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
    livereload:
      enabled: true

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-stacktrace: always
    include-message: always

# Training-specific Configuration
training:
  kafka:
    bootstrap-servers: localhost:9092
    client-id: kafka-training-dev
    admin:
      request-timeout: 30000
      connection-timeout: 10000
    producer:
      acks: 1
      retries: 3
      batch-size: 16384
      linger-ms: 5
      compression-type: snappy
    consumer:
      group-id: kafka-training-dev-consumers
      auto-offset-reset: earliest
      session-timeout: 30000
      heartbeat-interval: 3000

  # Development-specific features
  features:
    debug-mode: true
    detailed-logging: true
    auto-topic-creation: true
    demo-data-generation: true
    web-interface-enabled: true
    api-documentation: true

  # EventMart Configuration
  eventmart:
    demo:
      auto-start: false
      duration-minutes: 10
      events-per-second: 5
      users-count: 100
      products-count: 50
      orders-per-minute: 20

# Logging Configuration
logging:
  level:
    root: INFO
    com.training.kafka: DEBUG
    org.apache.kafka: INFO
    org.springframework.kafka: DEBUG
    org.springframework.web: DEBUG
    org.springframework.boot: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/kafka-training-dev.log
    max-size: 10MB
    max-history: 5

# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,configprops,beans,mappings,kafka
  endpoint:
    health:
      show-details: always
    kafka:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

