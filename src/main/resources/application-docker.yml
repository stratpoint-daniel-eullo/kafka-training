# Spring Boot Docker Profile Configuration
# This profile is optimized for running in Docker containers with Docker Compose

spring:
  # Application Configuration
  application:
    name: kafka-training-docker

  # Kafka Configuration for Docker
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: kafka-training-docker-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: true
      auto-commit-interval: 1000
      session-timeout: 30000
      heartbeat-interval: 3000
      max-poll-records: 500
      fetch-min-size: 1
      fetch-max-wait: 500
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      retries: 3
      batch-size: 16384
      linger-ms: 5
      buffer-memory: 33554432
      compression-type: snappy
      max-in-flight-requests-per-connection: 5
      enable-idempotence: false
    admin:
      fail-fast: false
      properties:
        request.timeout.ms: 30000
        connections.max.idle.ms: 300000

# Server Configuration for Docker
server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-stacktrace: on-param
    include-message: always

# Training-specific Configuration for Docker
training:
  kafka:
    bootstrap-servers: kafka:9092
    client-id: kafka-training-docker
    admin:
      request-timeout: 30000
      connection-timeout: 10000
    producer:
      acks: 1
      retries: 3
      batch-size: 16384
      linger-ms: 5
      compression-type: snappy
    consumer:
      group-id: kafka-training-docker-consumers
      auto-offset-reset: earliest
      session-timeout: 30000
      heartbeat-interval: 3000

  # Docker-specific features
  features:
    debug-mode: true
    detailed-logging: true
    auto-topic-creation: true
    demo-data-generation: true
    web-interface-enabled: true
    api-documentation: true

  # EventMart Configuration for Docker
  eventmart:
    demo:
      auto-start: false
      duration-minutes: 10
      events-per-second: 10
      users-count: 100
      products-count: 50
      orders-per-minute: 20

# Logging Configuration for Docker
logging:
  level:
    root: INFO
    com.training.kafka: DEBUG
    org.apache.kafka: INFO
    org.springframework.kafka: INFO
    org.springframework.web: INFO
    org.springframework.boot: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Management and Monitoring for Docker
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,kafka
  endpoint:
    health:
      show-details: always
    kafka:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Docker-specific configurations
# These can be used with Docker Compose environment variables
