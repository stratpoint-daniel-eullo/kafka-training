name = "kafka-training-docs"
main = "src/_worker.js"
compatibility_date = "2024-10-20"

[site]
bucket = "./site"

# Custom domain - using subdomain instead of subdirectory
routes = [
  { pattern = "kafka-training.stratpoint.io", zone_name = "stratpoint.io" },
  { pattern = "kafka-training.stratpoint.io/*", zone_name = "stratpoint.io" }
]

# Environment variables (if needed)
[vars]
ENVIRONMENT = "production"

